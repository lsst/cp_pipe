pipelineYaml: "${CP_PIPE_DIR}/pipelines/${INSTRUMENT}/cpCti.yaml"

project: "${TICKET}"
campaign: "${TICKET}"
submitPath: "${SCRATCH}/submit/{outputRun}"

# Necessary to cluster by exposure if there are many input exposures
clusterAlgorithm: lsst.ctrl.bps.quantum_clustering_funcs.dimension_clustering
cluster:
  cpCtiIsrByExposure:
    pipetasks: cpCtiIsr
    dimensions: exposure

payload:
  payloadName: "${INSTRUMENT}_${TICKET}_cti"
  output: "${USER_CALIB_PREFIX}${INSTRUMENT}/calib/${TICKET}/${TAG}/ctiGen.${RERUN}"
  butlerConfig: "${REPO}"
  inCollection: "u/abrought/LSSTCam/calib/DM-49847/run7-cti-corrected-ptc/linearizerGen.20250425a/20250425T193714Z,${RAW_COLLECTION},${CALIB_COLLECTIONS}"  # ${USER_CALIB_PREFIX}${INSTRUMENT}/calib/${TICKET}
  dataQuery: "${SELECTION_PTC_CTI}"
