description: cp_pipe LATISS linearizer calibration construction.
instrument: lsst.obs.lsst.Latiss
imports:
  - location: $CP_PIPE_DIR/pipelines/_ingredients/cpLinearizerLSST.yaml
tasks:
  cpLinearizerPtcExtractPair:
    class: lsst.cp.pipe.ptc.PhotonTransferCurveExtractPairTask
    config:
      efdSalIndex: 201
  cpLinearizerUnnormalizedSolve:
    class: lsst.cp.pipe.LinearitySolveTask
    config:
      maxLinearAdu: 120000
      usePhotodiode: false
      focalPlaneNormalizationMaxCounts: 200000
  cpLinearizerPtcNormalize:
    class: lsst.cp.pipe.ptc.PhotonTransferCurveNormalizeTask
    config:
      normalizeDetectors: [0]
      referenceDetector: 0
  cpLinearizerSolve:
    class: lsst.cp.pipe.LinearitySolveTask
    config:
      maxLinearAdu: 120000
      usePhotodiode: false
      focalPlaneNormalizationMaxCounts: 200000
